<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Utility Calculator</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Main styles -->
    <link rel="stylesheet" href="calci.css" />
</head>
<body>
    <!-- Sidebar Overlay (for mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-calculator"></i>
            <span>SmartCalc</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <!-- Populated by JavaScript -->
        </nav>
        <div class="sidebar-footer">v2.0 &bull; Made with <i class="fas fa-heart" style="color:var(--error);"></i></div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navigation Bar -->
        <header class="top-nav">
            <div class="left">
                <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                    <i class="fas fa-bars"></i>
                </button>
                <span style="font-weight:600;font-size:18px;display:none;" id="mobileBrand">SmartCalc</span>
            </div>
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search tools..." id="globalSearch" />
            </div>
            <div class="right">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="historyToggle" aria-label="History">
                    <i class="fas fa-clock-rotate-left"></i>
                </button>
            </div>
        </header>

        <!-- Page Content (injected by JS) -->
        <div class="page-content" id="pageContent"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Done</span>
    </div>

    <!-- Main JavaScript -->
    <script src="calci.js"></script>
</body>
</html>vv
